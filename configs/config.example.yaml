# config.example.yaml — copy to config.yaml and fill in your values.
# Environment variables override any value here (via Viper AutomaticEnv).
# Variable names: upper-case, dots replaced with underscores (e.g. DB_HOST, JWT_SECRET).

server:
  host: "0.0.0.0"
  port: 8080           # Management API — JWT-authenticated
  agent_port: 8443     # Pull Agent protocol — mTLS

  # mTLS for agent_port (leave blank for dev plain-HTTP mode)
  tls_cert_file: ""    # Path to server cert (signed by Agent CA)
  tls_key_file: ""     # Path to server key
  ca_cert_file: ""     # Agent CA cert — used to verify agent client certs

db:
  host: "localhost"
  port: 5432
  name: "domain_platform"
  user: "postgres"
  password: ""         # required in prod — use DB_PASSWORD env var
  ssl_mode: "disable"  # "require" in production
  max_open: 25
  max_idle: 5

redis:
  addr: "localhost:6379"
  password: ""         # required in prod — use REDIS_PASSWORD env var
  db: 0

# S3-compatible object storage (MinIO in dev, AWS S3 in prod)
storage:
  endpoint: "localhost:9000"     # MinIO dev endpoint; "s3.amazonaws.com" for AWS
  bucket: "artifacts"
  artifacts_bucket: "artifacts"
  access_key: "minioadmin"       # change in prod — use S3_ACCESS_KEY env var
  secret_key: "minioadmin"       # change in prod — use S3_SECRET_KEY env var
  use_ssl: false                 # true in production

jwt:
  secret: "change-me-in-production"   # use JWT_SECRET env var
  expiry: "24h"

# Pull Agent configuration (only relevant when running cmd/agent)
agent:
  control_plane_url: "https://your-control-plane.internal:8443"
  cert_file: ""          # Agent client cert path
  key_file: ""           # Agent client key path
  ca_cert_file: ""       # Agent CA cert — used to verify the control plane
  heartbeat_secs: 30

telegram:
  bot_token: ""          # use TELEGRAM_BOT_TOKEN env var
  chat_id: ""            # use TELEGRAM_CHAT_ID env var

webhook:
  url: ""                # use WEBHOOK_URL env var
