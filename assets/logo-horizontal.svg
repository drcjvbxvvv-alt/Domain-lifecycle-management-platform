<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <radialGradient id="bgH" cx="42%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="glowH" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gridFadeH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="orbitH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="gcH">
      <circle cx="60" cy="60" r="27"/>
    </clipPath>
  </defs>

  <!-- ── Icon badge (scaled to 120×120, centered at 60,60) ── -->
  <circle cx="60" cy="60" r="56" fill="url(#bgH)"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.5"/>

  <!-- Globe glow -->
  <circle cx="60" cy="60" r="37" fill="url(#glowH)"/>

  <!-- Globe grid -->
  <g clip-path="url(#gcH)">
    <line x1="33" y1="49" x2="87" y2="49" stroke="url(#gridFadeH)" stroke-width="1"/>
    <line x1="33" y1="60" x2="87" y2="60" stroke="url(#gridFadeH)" stroke-width="1"/>
    <line x1="33" y1="71" x2="87" y2="71" stroke="url(#gridFadeH)" stroke-width="1"/>
    <ellipse cx="60" cy="60" rx="14" ry="27" fill="none" stroke="#38bdf8" stroke-width="0.9" opacity="0.45"/>
    <ellipse cx="60" cy="60" rx="25" ry="27" fill="none" stroke="#38bdf8" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Globe outline -->
  <circle cx="60" cy="60" r="28" fill="none" stroke="#38bdf8" stroke-width="2"/>

  <!-- Signal arcs -->
  <circle cx="60" cy="60" r="2" fill="#7dd3fc" opacity="0.95"/>
  <path d="M 56 60 A 4 4 0 0 0 64 60" fill="none" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.80"/>
  <path d="M 50 60 A 10 10 0 0 0 70 60" fill="none" stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>

  <!-- Orbit ring -->
  <circle cx="60" cy="60" r="42"
          fill="none" stroke="url(#orbitH)"
          stroke-width="1.5" stroke-dasharray="5 4" opacity="0.65"/>

  <!-- Arrow on orbit (~195°) -->
  <!-- 195°: (60+42·cos195°, 60+42·sin195°) ≈ (60-40.6, 60-10.9) ≈ (19.5, 49.1) -->
  <polygon points="19,49  24,44  22,54" fill="#38bdf8" opacity="0.85"/>

  <!-- Probe nodes (r=42) -->
  <!-- 270°: (60, 18) -->
  <circle cx="60"  cy="18" r="4" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="60"  cy="18" r="1.5" fill="#7dd3fc"/>
  <!-- 30°: (60+36.4, 60+21) = (96.4, 81) ≈ (96, 81) -->
  <circle cx="96"  cy="81" r="4" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="96"  cy="81" r="1.5" fill="#7dd3fc"/>
  <!-- 150°: (60-36.4, 60+21) = (23.6, 81) ≈ (24, 81) -->
  <circle cx="24"  cy="81" r="4" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="24"  cy="81" r="1.5" fill="#7dd3fc"/>

  <!-- ── Text ── -->
  <!-- Primary title -->
  <text x="140" y="46"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#f0f9ff">Domain Platform</text>

  <!-- Subtitle / tagline -->
  <text x="141" y="70"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="0.5"
        fill="#38bdf8"
        opacity="0.85">域名全生命週期管理平台</text>

  <!-- Divider line between icon and text -->
  <line x1="128" y1="22" x2="128" y2="98"
        stroke="#1e40af" stroke-width="1" opacity="0.6"/>


</svg>
