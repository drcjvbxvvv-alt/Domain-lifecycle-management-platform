# Local development stack.
# Usage: docker compose up -d
# Ports exposed on localhost only — NOT suitable for production.

services:

  # ── PostgreSQL 16 + TimescaleDB ────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: domain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: domain_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d domain_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: domain_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible artifact store) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: domain_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: domain_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/artifacts &&
        mc anonymous set none local/artifacts &&
        echo 'MinIO bucket init complete'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
